<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cascade</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css?v=1.0.4" />
  </head>
  <body>
    <!-- Atmospheric background blobs -->
    <div class="blob blob-a" aria-hidden="true"></div>
    <div class="blob blob-b" aria-hidden="true"></div>
    <div class="blob blob-c" aria-hidden="true"></div>

    <!-- App shell -->
    <div class="app-shell">
      <!-- Header -->
      <header class="app-header">
        <span class="wordmark">cascade</span>
      </header>

      <!-- Main layout grid -->
      <div class="layout-grid">
        <!-- Left Column: Orb and Status Panel -->
        <div class="orb-card glass">
          <div
            class="orb-wrapper state-idle"
            id="orb"
            role="button"
            aria-label="Tap to start voice session"
            tabindex="0"
          >
            <!-- Layer 1: outer glow (box-shadow only, no background) -->
            <div class="orb-glow-ring" aria-hidden="true"></div>
            <div class="orb-shell glass">
              <div class="orb-core" id="orb-core"></div>
              <div class="orb-highlight" aria-hidden="true"></div>
              <div class="orb-ring ring-1" aria-hidden="true"></div>
              <div class="orb-ring ring-2" aria-hidden="true"></div>
              <div class="orb-ring ring-3" aria-hidden="true"></div>
            </div>
          </div>
          <p class="status-text state-idle" id="status-text">tap to begin</p>
          <p class="stats-bar" id="stats-bar">↯ --ms · 0 turns · edge-tts</p>

          <!-- TTS Engine Selector -->
          <div class="tts-selector">
            <label for="tts-engine-selector" class="tts-label"
              >TTS Engine</label
            >
            <select id="tts-engine-selector" class="tts-select">
              <option value="edge">Edge-TTS (Free)</option>
              <option value="deepgram">Deepgram Aura (Fast)</option>
            </select>
          </div>
        </div>

        <!-- Right Column: Conversation Transcript Panel -->
        <div class="transcript-card glass">
          <div
            class="transcript-panel"
            id="transcript-panel"
            role="log"
            aria-live="polite"
            aria-label="Conversation transcript"
          >
            <p class="transcript-empty" id="transcript-empty">
              Your conversation will appear here...
            </p>
          </div>
        </div>
      </div>

      <!-- Bottom Menu Bar -->
      <footer class="menu-bar glass">
        <button
          class="menu-btn menu-btn-primary"
          id="btn-toggle-session"
          title="Start or Stop Session"
        >
          <svg
            class="btn-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M12 1C6.48 1 2 5.48 2 11s4.48 10 10 10 10-4.48 10-10S17.52 1 12 1zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 7 15.5 7 14 7.67 14 8.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 7 8.5 7 7 7.67 7 8.5 7.67 10 8.5 10zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"
            ></path>
          </svg>
          <span class="btn-label">Begin</span>
        </button>
        <button
          class="menu-btn"
          id="btn-clear-transcript"
          title="Clear Conversation Log"
        >
          <svg
            class="btn-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="3 6 5 6 21 6"></polyline>
            <path
              d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
            ></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
          <span class="btn-label">Reset</span>
        </button>
        <button class="menu-btn" id="btn-mute" title="Mute Microphone" disabled>
          <svg
            class="btn-icon"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M1 9v3h4l3.26 3.26a.9.9 0 0 0 .65.24a.9.9 0 0 0 .65-.24l3.26-3.26h4V9"
            ></path>
            <path d="M23 16a6 6 0 0 1-12 0"></path>
            <circle cx="12" cy="16" r="1"></circle>
          </svg>
          <span class="btn-label">Mic Off</span>
        </button>
      </footer>
    </div>

    <!-- Toast container -->
    <div
      class="toast-container"
      id="toast-container"
      aria-live="assertive"
    ></div>

    <script src="app.js?v=1.0.4"></script>
  </body>
</html>
