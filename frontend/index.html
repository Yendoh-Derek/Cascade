<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cascade — AI Voice Tutor</title>
    <meta name="description" content="Cascade is a premium AI voice tutor assistant. Speak naturally and get instant, intelligent responses." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css"
      integrity="sha384-n8MVd4RsNIU0tAv4ct0nTaAbDJwPJzDEaqSD1odI+WdtXRGWt2kTvGFasHpSy3SV"
      crossorigin="anonymous"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js" integrity="sha384-XjKyOOlGwcjNTAIQHIpgOno0Hl1YQqzUOEleOLALmuqehneUG+vnGctmUb0ZY0l8" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css?v=2.1.1" />
  </head>
  <body>
    <!-- App shell -->
    <div class="app-shell">
      <!-- Header -->
      <header class="app-header">
        <span class="wordmark">cascade</span>
        <div class="quota-timer" id="quota-timer" aria-hidden="true">
          <span id="quota-timer-text">05:00</span>
        </div>
      </header>

      <!-- Main layout grid -->
      <div class="layout-grid">
        <!-- Left Column: Orb Panel -->
        <div class="orb-card glass">
          <div class="orb-boundary">
          <div
            class="orb-wrapper state-idle"
            id="orb"
            role="button"
            aria-label="Tap to start voice session"
            tabindex="0"
          >
            <!-- Layer 1: outer glow (box-shadow only, no background) -->
            <div class="orb-glow-ring" aria-hidden="true"></div>
            <div class="orb-shell">
              <div class="orb-core" id="orb-core"></div>
              <div class="orb-highlight" aria-hidden="true"></div>
              <div class="orb-ring ring-1" aria-hidden="true"></div>
              <div class="orb-ring ring-2" aria-hidden="true"></div>
              <div class="orb-ring ring-3" aria-hidden="true"></div>

              <!-- State Icons Layer -->
              <div class="orb-icon-layer" aria-hidden="true">
                <!-- Listening: animated mic waveform bars -->
                <div class="orb-icon orb-icon-listen" id="orb-icon-listen">
                  <div class="listen-bar" id="lbar-1"></div>
                  <div class="listen-bar" id="lbar-2"></div>
                  <div class="listen-bar" id="lbar-3"></div>
                  <div class="listen-bar" id="lbar-4"></div>
                  <div class="listen-bar" id="lbar-5"></div>
                </div>
                <!-- Thinking: orbiting dots -->
                <div class="orb-icon orb-icon-think">
                  <div class="think-dot dot-1"></div>
                  <div class="think-dot dot-2"></div>
                  <div class="think-dot dot-3"></div>
                </div>
                <!-- Speaking: equalizer bars -->
                <div class="orb-icon orb-icon-speak" id="orb-icon-speak">
                  <div class="speak-bar" id="sbar-1"></div>
                  <div class="speak-bar" id="sbar-2"></div>
                  <div class="speak-bar" id="sbar-3"></div>
                  <div class="speak-bar" id="sbar-4"></div>
                </div>
              </div>
            </div>
          </div>
          </div><!-- /.orb-boundary -->

          <!-- Status label - hidden in idle, shown during active states -->
          <p class="status-text state-idle" id="status-text" aria-live="polite"></p>
        </div>

        <!-- Right Column: Conversation Transcript Panel -->
        <div class="transcript-card glass">
          <div class="transcript-header">
            <span class="transcript-header-label">
              <!-- Chat bubble icon -->
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
              </svg>
              Conversation
            </span>
          </div>
          <div
            class="transcript-panel"
            id="transcript-panel"
            role="log"
            aria-live="polite"
            aria-label="Conversation transcript"
          >
            <p class="transcript-empty" id="transcript-empty">
              Your conversation will appear here...
            </p>
          </div>
        </div>
      </div>

      <!-- Bottom Menu Bar -->
      <!--
        UI DECISION (ADR-005): TTS Voice Selector removed from menu bar.
        Deepgram Aura 2 is the hardcoded default TTS engine.
        To re-enable the TTS selector, see docs/adr/ADR-005-tts-selector-removed.md
        and un-comment the .menu-bar-left block below, then un-comment the
        corresponding code in frontend/ui.js (_restoreTTSSelection, TTS toggle listeners).
      -->
      <footer class="menu-bar menu-bar--centered glass">
        <!--
        [TTS SELECTOR — DISABLED]
        To re-enable: remove these comment tags and restore the menu-bar layout
        to use justify-content: space-between (remove .menu-bar--centered class).
        Also un-comment the TTS listener block in frontend/ui.js.

        <div class="menu-bar-left">
          <span class="tts-label">Voice</span>
          <div class="tts-toggle-group">
            <button class="tts-toggle-btn active" id="tts-btn-deepgram" data-engine="deepgram" aria-pressed="true" title="Deepgram Aura 2 — low latency (recommended)">
              Aura 2
            </button>
            <button class="tts-toggle-btn" id="tts-btn-edge" data-engine="edge" aria-pressed="false" title="Edge TTS — free fallback (higher latency)">Edge (fallback)</button>
          </div>
        </div>
        -->

        <!-- Action Buttons (centered) -->
        <div class="menu-bar-center">
          <button
            class="menu-btn menu-btn-primary"
            id="btn-toggle-session"
            title="Start or Stop Session"
          >
            <span class="btn-label">Begin</span>
          </button>
          <button
            class="menu-btn"
            id="btn-clear-transcript"
            title="Clear Conversation Log"
          >
            <span class="btn-label">Reset</span>
          </button>
          <button class="menu-btn" id="btn-stats" title="View Latency Chart">
            <span class="btn-label">Charts</span>
          </button>
        </div>
      </footer>

      <!-- Latency Stats Panel -->
      <div class="stats-panel glass" id="stats-panel" aria-hidden="true">
        <div class="stats-panel-header">
          <span class="stats-panel-title">Latency Breakdown</span>
          <button class="stats-close-btn" id="btn-close-stats">✕</button>
        </div>
        <div class="stats-legend stats-legend--chart" aria-hidden="false">
          <span><span class="legend-dot" style="background:#60a5fa"></span>Endpointing</span>
          <span><span class="legend-dot" style="background:#818cf8"></span>STT Tail</span>
          <span><span class="legend-dot" style="background:#c084fc"></span>LLM</span>
          <span><span class="legend-dot" style="background:#34d399"></span>TTS</span>
          <span><span class="legend-dot" style="background:#fb923c"></span>System</span>
        </div>
        <canvas id="latency-chart" width="600" height="300"></canvas>
      </div>
      <div class="stats-backdrop" id="stats-backdrop"></div>
    </div>

    <!-- Toast container -->
    <div
      class="toast-container"
      id="toast-container"
      aria-live="assertive"
    ></div>

    <!-- Secret Modal -->
    <div class="modal-backdrop" id="secret-modal-backdrop" aria-hidden="true">
      <div class="modal glass" id="secret-modal" role="dialog" aria-labelledby="secret-modal-title">
        <div class="modal-header">
          <span class="modal-title" id="secret-modal-title">Access Required</span>
        </div>
        <div class="modal-body">
          <p>Please enter the Cascade access secret to continue:</p>
          <input type="password" id="secret-input" class="modal-input" placeholder="Enter secret..." />
        </div>
        <div class="modal-footer">
          <button class="menu-btn" id="btn-cancel-secret">Cancel</button>
          <button class="menu-btn menu-btn-primary" id="btn-submit-secret">Submit</button>
        </div>
      </div>
    </div>

    <!-- Feedback Survey Modal -->
    <div class="modal-backdrop" id="survey-modal-backdrop" aria-hidden="true">
      <div class="modal glass" id="survey-modal" role="dialog" aria-labelledby="survey-modal-title">
        <div class="modal-header">
          <span class="modal-title" id="survey-modal-title">Thanks for testing Cascade!</span>
        </div>
        <div class="modal-body" id="survey-body">
          <p id="survey-message">Your testing time has concluded. We'd love your quick feedback.</p>
          <div class="survey-form">
            <label for="survey-rating">How natural did the voice feel? (1-5)</label>
            <div class="rating-group" id="survey-rating">
              <button class="rating-btn" data-value="1">1</button>
              <button class="rating-btn" data-value="2">2</button>
              <button class="rating-btn" data-value="3">3</button>
              <button class="rating-btn" data-value="4">4</button>
              <button class="rating-btn" data-value="5">5</button>
            </div>
            <label for="survey-comment">Any other thoughts?</label>
            <textarea id="survey-comment" class="modal-input survey-textarea" placeholder="Latency was good, but..."></textarea>
          </div>
        </div>
        <div class="modal-footer" id="survey-footer">
          <button class="menu-btn menu-btn-primary" id="btn-submit-survey" disabled>Submit Feedback</button>
        </div>
      </div>
    </div>

    <script type="module" src="app.js?v=2.1.1"></script>
  </body>
</html>
