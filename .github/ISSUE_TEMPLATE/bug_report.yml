name: Bug report
description: Something in Cascade isn't behaving as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue. Include which STT/TTS/LLM providers you were using if relevant.
      placeholder: |
        1. Start the backend with ...
        2. Speak the phrase ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / WebSocket messages
      description: Paste any backend logs or captured WS message traces. Redact API keys.
      render: shell
    validations:
      required: false

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "OS, Python version, browser, STT/TTS provider config"
    validations:
      required: false
