version: 2
updates:
  # Python backend dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      # Bundle routine patch/minor bumps into one PR instead of one-per-package.
      python-minor-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # torch sits on the latency-critical VAD/audio path (see vad.py) and was
      # previously pinned to work around a CI install issue — require a
      # manual review + major-version bump rather than an automatic PR.
      - dependency-name: "torch"
        update-types: ["version-update:semver-major"]
      # numpy 2.5.0+ requires Python >=3.12; ci.yml currently pins 3.11.
      # Bump this ignore (or drop it) once CI moves to 3.12+.
      - dependency-name: "numpy"
        versions: [">=2.5.0"]

  # GitHub Actions pinned versions (e.g. actions/checkout@v4)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels:
      - "dependencies"
      - "ci"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"