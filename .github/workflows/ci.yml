name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default: workflow only needs to read the repo to run
# lint/type-check/tests. Override per-job if a future job needs to write
# (e.g. publishing a release or commenting on a PR).
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # torch is pinned in requirements.txt — install from PyPI, not
          # download.pytorch.org/whl/cpu (R2 CDN TLS handshake fails on GHA).
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint check with Ruff
        run: ruff check .

      - name: Type check with Mypy
        run: mypy backend/ --ignore-missing-imports

      - name: Run isolated/mockable tests
        # Runs all pytest unit/integration tests that do not require live API keys
        run: pytest tests/ -v

      - name: Run frontend chart smoke test
        run: node tests/frontend/test_chart.js

      - name: Run frontend playback state smoke test
        run: node tests/frontend/test_playback_state.js
