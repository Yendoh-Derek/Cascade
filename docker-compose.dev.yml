version: '3.8'

services:
  cascade:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - CASCADE_STT_ENDPOINTING=${CASCADE_STT_ENDPOINTING:-300}
      - CASCADE_MAX_HISTORY_TURNS=${CASCADE_MAX_HISTORY_TURNS:-10}
      - CASCADE_IDLE_TIMEOUT_SEC=${CASCADE_IDLE_TIMEOUT_SEC:-300}
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
